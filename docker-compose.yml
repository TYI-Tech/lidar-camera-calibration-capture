services:
  calibration-capture:
    image: ${CALIBRATION_CAPTURE_IMAGE:-lidar-camera-calibration-capture:0.1.0}
    container_name: ${CALIBRATION_CAPTURE_CONTAINER_NAME:-lidar-camera-calibration-capture}
    network_mode: host
    ipc: host
    user: ${CALIBRATION_RUN_UID:-1000}:${CALIBRATION_RUN_GID:-1000}
    restart: "no"
    environment:
      ROS_MASTER_PORT: ${ROS_MASTER_PORT:-11311}
      ROS_MASTER_URI: ${ROS_MASTER_URI:-http://127.0.0.1:11311}
      ROS_HOSTNAME: ${ROS_HOSTNAME:-127.0.0.1}
      ROS_LOG_DIR: /logs/ros
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      CALIBRATION_BAG_DIR: /data/bags
      CALIBRATION_INTRINSIC_OUTPUT_DIR: /data/intrinsics
      CALIBRATION_INTRINSIC_PATTERN_COLUMNS: ${CALIBRATION_INTRINSIC_PATTERN_COLUMNS:-12}
      CALIBRATION_INTRINSIC_PATTERN_ROWS: ${CALIBRATION_INTRINSIC_PATTERN_ROWS:-8}
      CALIBRATION_INTRINSIC_SQUARE_M: ${CALIBRATION_INTRINSIC_SQUARE_M:-0.020}
      CALIBRATION_INTRINSIC_CAMERA_NS: ${CALIBRATION_INTRINSIC_CAMERA_NS:-/usb_cam}
      CALIBRATION_LIVOX_INPUT_TOPIC: ${CALIBRATION_LIVOX_INPUT_TOPIC:-/livox/lidar}
      CALIBRATION_POINTS_TOPIC: ${CALIBRATION_POINTS_TOPIC:-/calibration/livox/points}
      CALIBRATION_POINTS_FRAME_ID: ${CALIBRATION_POINTS_FRAME_ID:-livox_frame}
      CALIBRATION_IMAGE_TOPIC: ${CALIBRATION_IMAGE_TOPIC:-/usb_cam/image_raw}
      CALIBRATION_CAMERA_INFO_TOPIC: ${CALIBRATION_CAMERA_INFO_TOPIC:-/usb_cam/camera_info}
      CALIBRATION_DEPTH_TOPIC: ${CALIBRATION_DEPTH_TOPIC:-}
      CALIBRATION_RECORD_DEPTH: ${CALIBRATION_RECORD_DEPTH:-false}
      CALIBRATION_DURATION_SEC: ${CALIBRATION_DURATION_SEC:-15}
      CALIBRATION_WAIT_TIMEOUT_SEC: ${CALIBRATION_WAIT_TIMEOUT_SEC:-20}
    volumes:
      - ./calibration_data:/data
      - ./logs/calibration-capture:/logs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    build:
      context: .
      dockerfile: docker/calibration-capture/Dockerfile
      network: host
      args:
        BASE_IMAGE: ${CALIBRATION_CAPTURE_BASE_IMAGE:-ros:noetic-ros-base-focal}
        INSTALL_APT_DEPS: ${CALIBRATION_CAPTURE_INSTALL_APT_DEPS:-true}
